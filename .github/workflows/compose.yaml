name: C Compile CI

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Tento blok je NUTNÝ, aby měl GitHub běžec právo vytvářet Releases a zapisovat do nich
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Compile main.c
      run: |
        gcc main.c -o adventuregame

    # Tento krok vytvoří Release na GitHubu a nahraje do něj tvůj soubor
    - name: Create Release and Upload Asset
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ github.ref_name }} adventuregame \
          --title "Release ${{ github.ref_name }}" \
          --notes "Automaticky vygenerovaný release pro tag ${{ github.ref_name }}"